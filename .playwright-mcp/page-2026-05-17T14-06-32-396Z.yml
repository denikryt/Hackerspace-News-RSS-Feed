            - generic [ref=e1819]: 1:30 AM - 4:30 AM
            - paragraph [ref=e1820]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1821]:
              - text: RSVP https://www.eventbrite.com/e/public-craft-night-mondays-and-thursdays-tickets-1987367853749
              - text: Learn, make and share at NYC Resistor (all events18+)Note this event is 18+
              - text: Welcome to Craft Night! Masks are now OPTIONAL at all our Craft Nights, Mondays and Thursdays. Your RSVP here is much appreciated so we can notify you of any covid contact after the fact, but is not required. Come on out, bring your freinds, and stay safe out there! Looking for a masks-on version of Craft Night? Check out Masks-On Craft Night!
              - text: NYC Resistor is open to the public for Craft Nights every Monday and Thursday from 6:30-9:30 PM! Come bring your current crafting project and work on it with other artists, crafters, and makers of all kinds. Resistors do everything from costumes to electronics to visual arts to woodworking; people and crafting projects of all sorts are enthusiastically welcome. We are a proactively inclusive space, and prioritize creating opportunities for the whole community to engage with our events, across all identities of race, creed, ethnicity, age, religion, gender, gender identity, sexual orientation, physical appearance, and ability; please read our Code of Conduct to familiarize yourself with our community's values before attending.
