            - 'heading "Intro to Soldering Workshop: Make an LED Tile" [level=4] [ref=e560]'
            - generic [ref=e562]: 8:00 PM - 11:00 PM
            - paragraph [ref=e563]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e564]:
              - text: RSVP https://www.eventbrite.com/e/intro-to-soldering-workshop-make-an-led-tile-tickets-1987369862758
              - text: Soldering is one of the most important skills you'll need for working with electronics. Come join us for an introductory through-hole solderSoldering is one of the most important skills you'll need for working with electronics. Come join us for an introductory through-hole soldering workshop. Soldering enables you to create sturdy connections between electrical components. In this hands-on workshop, you'll learn how to use a soldering iron safely and effectively, and get plenty of practice with both soldering and de-soldering techniques. We'll be soldering up some Game of Life kits - LED tiles that generate nifty animations. No previous experience is required, making this introductory workshop a great choice for anyone who's curious about getting started with hardware tinkering! All materials will be provided.
              - text: OK, awesome, I want to join!
              - text: Please be ready to start at 1pm! We find that you will need this time to get through the whole class. Our classes tend to sell out about a week in advance so if you're interested, you may want to sign up early.
              - text: This class will be taught by Resistor member Woody.
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/. Please note that refunds must be requested 72 hours in advance. If you have any questions, please email classes@nycresistor.com.
              - text: This program is supported, in part, by public funds from the New York City Department of Cultural Affairs in partnership with the City Council.
