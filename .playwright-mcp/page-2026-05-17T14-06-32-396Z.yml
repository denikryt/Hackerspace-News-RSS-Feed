          - article [ref=e1453]:
            - heading "Synthesizer Night @ NYC Resistor" [level=4] [ref=e1454]
            - generic [ref=e1456]: 2:30 AM - 5:30 AM
            - paragraph [ref=e1457]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1458]:
              - text: RSVP https://www.eventbrite.com/e/synthesizer-night-nyc-resistor-tickets-1988883848129
              - text: Gathering musicians, enthusiasts, and curious minds to connect, collaborate, and share their passion for synthesis. BYO synth encouraged!Join us at NYC Resistor, a makerspace in Brooklyn for an electrifying Synthesizer Night! Get ready to unleash your creativity, explore sonic landscapes, and connect with fellow synth enthusiasts in an evening dedicated to the mesmerizing world of synthesizers. This is a pay-what-you-wish event (recommended donation $8).
              - text: Synthesizer Night at NYC Resistor is a celebration of all things synthesizer. Whether you're a seasoned musician, an avid collector, or simply fascinated by the possibilities of electronic sound, this event offers a unique opportunity to gather with like-minded individuals and revel in the captivating soundscape of synthesizers.
              - text: At Synthesizer Night, participants are encouraged to bring their own synthesizers, from vintage analog gems to cutting-edge modular wonders. It's a chance to showcase your personal setup, experiment with new equipment, and dive into the rich sonic tapestry that synthesizers offer.
              - text: For those looking to enhance the collaborative experience, consider arriving early to connect your synthesizer to a MIDI/CV clock. This allows for synchronized timing among all instruments, creating a seamless musical fusion during impromptu jam sessions.
              - text: In addition to the collaborative jam sessions, the event provides a unique opportunity for a show and tell/play with anything that attendees bring. Share your favorite gear, experiment with different setups, and engage in hands-on exploration of various synthesizers and electronic music equipment.
              - text: The event unfolds in a relaxed and welcoming atmosphere, providing a platform for musicians, enthusiasts, and curious minds to connect, collaborate, and share their passion for synthesis. Whether you're a beginner seeking guidance or an expert eager to inspire others, Synthesizer Night is the perfect setting to engage in conversations, exchange knowledge, and foster a vibrant community.
              - text: Throughout the evening, you'll have the opportunity to engage in impromptu jam sessions, where the collective energy of multiple synthesizers intertwines to create awe-inspiring sounds. Experience the joy of collaborating with fellow musicians, experiment with different genres and styles, and let the unique characteristics of each instrument shape your sonic explorations.
              - text: "Additionally, for those who wish to showcase their skills and perform, there will be dedicated performance slots. Take center stage, captivate the audience, and let your creativity soar as you demonstrate the full potential of your synthesizer setup. To sign up for a performance slot, email classes@nycresistor.com or join our Discord and post to #synth."
              - text: Whether you're an ardent synth enthusiast, an aspiring musician, or simply curious about the captivating world of synthesizers, Synthesizer Night at NYC Resistor is an event that will inspire, educate, and leave you in awe of the boundless possibilities that electronic sound offers. Don't miss this opportunity to immerse yourself in an evening of music, collaboration, and innovation. Mark your calendars, pack up your favorite synths, and join us at NYC Resistor for a night you won't soon forget. We can't wait to see you there!
              - text: This is a masks optional event.
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/.
