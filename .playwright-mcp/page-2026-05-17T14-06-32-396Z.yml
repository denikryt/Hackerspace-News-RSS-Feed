            - paragraph [ref=e1464]: 🇺🇸 · Noisebridge
            - paragraph [ref=e1465]:
              - text: Noisebridge Hackerspace
              - text: "**WIKI:** https://www.noisebridge.net/wiki/Showcase_Showdown"
              - text: "# Showcase Showdown 2nd & 4th Fridays"
              - text: Showcase Showdown is an indie game showcase and fighting game tourney featuring Smash Melee competition.
              - text: "* **WHEN: 2**nd and 4th Fridays at [Noisebridge](https://www.noisebridge.net/wiki/Noisebridge \"Noisebridge\") at 7pm-12am."
              - text: "* **WHAT:** Play indie games showcases & competitive games like [Super Smash Brothers Melee](https://www.noisebridge.net/index.php?title=Super_Smash_Brothers_Melee&action=edit&redlink=1 \"Super Smash Brothers Melee (page does not exist)\")."
              - text: "* It is part of our [Fighting Game Fridays](https://www.noisebridge.net/wiki/Category:Fighting_Game_Fridays \"Category:Fighting Game Fridays\") alternating with [School of Melee](https://www.noisebridge.net/wiki/School_of_Melee \"School of Melee\") 1st and 4th Fridays."
              - text: "* It started as Noisebridge's first [GDC](https://www.noisebridge.net/wiki/GDC \"GDC\") IndieSmash event in 2026."
              - text: "* **WHERE:** [Noisebridge](https://www.noisebridge.net/wiki/Noisebridge \"Noisebridge\") Hackerspace, [272](https://www.noisebridge.net/wiki/272 \"272\") Capp St. San Francisco, CA"
              - text: "* **COST:** **FREE!** Noisebridge runs on donations and 24 hour access card memberships."
              - text: "# Indie Games Showcases"
              - text: "* **GAMERS:** Do you want to see the next generation of games being showcased and playtested?"
              - text: "* **DEVS\"** Do you have a game in the works or released that you'd like to share?"
              - text: "## GAMERS COME PLAY THE NEXT WAVE"
              - text: We have a wide variety of exciting new games in development or recently released for you to try!
              - text: "* Meet the developers and share your playtesting feedback to help shape the future of gaming."
              - text: "## DEVS COME SHOW YOUR HARD WORK"
              - text: We are seeking games to show so get in touch and show up with your games to share!
              - text: "* We can help you set up your demo station and promotional materials to help attendees play, wishlist, give feedback and buy your game."
              - text: "* Come to [Gamebridge](https://www.noisebridge.net/wiki/Gamebridge \"Gamebridge\") Wednesdays and we'll set you up."
              - text: "* Introduce yourself on our [Discord](https://www.noisebridge.net/wiki/Discord \"Discord\") #games channel and tell us about the game you want to showcase and what promo material and setup you plan to have."
              - text: "# Competitive Game Tournaments"
              - text: "## Smash Melee Tourney"
              - text: Smash Melee is our founding game tourney that we began with and will continue every event.
              - text: "## Halo"
              - text: We are planning a Halo tourney soon with some folks volunteering to do that.
              - text: "## Street Fighter & Marvel VS Capcom"
              - text: Street Fighter games are at the roots of the fighting game community and we play these games too.
              - text: "## Soul Calibur"
              - text: A tale of souls and swords, the soul still burns from our days with the Dreamcast.
              - text: "* We would like to have a Soul Calibur 6 tournament soon."
              - text: "* We could play console Calibur games if we get the right set of consoles and discs or figure out how to get them."
              - text: "## Aether"
              - text: A newer kind of fighting game.
              - text: "## Skull Girls"
              - text: A really artistic and cool fighting game.
              - text: "## Bring them blue sparks! Suggest a game"
              - text: Do you have a game you'd like to arrange to play at Showcase Showdown?
