          - article [ref=e1166]:
            - 'heading "Make the Internet Blink: Web-Controlled LED Matrix Lab (CHM)" [level=4] [ref=e1167]':
              - 'link "Make the Internet Blink: Web-Controlled LED Matrix Lab (CHM)" [ref=e1168] [cursor=pointer]':
                - /url: https://www.meetup.com/noisebridge/events/314748089/
            - generic [ref=e1170]: 5:00 AM - 7:00 AM
            - paragraph [ref=e1171]: 🇺🇸 · Noisebridge
            - paragraph [ref=e1172]:
              - text: Noisebridge Hackerspace
              - text: What happens when you mix websites, Wi-Fi, and blinking LEDs? You get a tiny internet-connected billboard you control yourself.
              - text: In this beginner-friendly makerspace workshop, you’ll build a simple website that sends commands to an ESP32-powered LED matrix over Wi-Fi. Press buttons on your webpage to display messages, trigger animations, and control your matrix in real time using a Node.js server and web sockets.
              - text: You’ll learn how websites talk to hardware without getting buried in complicated code—we’ll provide working starter code so you can focus on customizing and making it your own. Expect plenty of copy/paste coding, hands-on building, and satisfying “wait...I made that?!” moments.
              - text: "By the end of class, you’ll leave with:"
              - text: "* A working LED matrix connected to an ESP32"
              - text: "* A simple website you can customize"
              - text: "* A Node.js server that sends commands to your hardware"
              - text: "* Fun animations, scrolling text, or custom patterns you create"
              - text: Perfect for beginners who are curious about coding, hardware, or building weird things that probably blink too much.
              - text: "**No prior coding experience required.** Basic computer comfort helps."
              - text: "*Come make a website that bosses around LEDs.*"
              - text: "**If you have a laptop, please bring it — but come anyway if you don’t!**"
