            - heading "XV Poznańska Impreza Wolnego Oprogramowania" [level=4] [ref=e1888]:
              - link "XV Poznańska Impreza Wolnego Oprogramowania" [ref=e1889] [cursor=pointer]:
                - /url: https://mobilizon.pl/events/31710200-176f-452e-8c49-220e46efc15e
            - generic [ref=e1891]: 10:00 AM - 11:00 PM
            - paragraph [ref=e1892]: 🇵🇱 · Knyfyrtel Hackerspace Poznań
            - paragraph [ref=e1893]:
              - text: Poznańska Impreza Wolnego Oprogramowania (P.I.W.O.) to otwarta, darmowa konferencja organizowana w Poznaniu, której głównym celem jest upowszechnianie idei wolnego i otwartego oprogramowania oraz promowanie systemów z rodziny GNU/Linux.
              - text: To całodniowe wydarzenie składa się z wykładów, warsztatów, lightning talków, wystaw, a także konkursów i turniejów LAN Party. Tematyka prelekcji obejmuje szeroki wachlarz zagadnień – programowanie, bezpieczeństwo, hacking, hardware, gaming, DevOps, administracja sieciami, a nawet zagadnienia prawne związane z wolnym oprogramowaniem. Nie zabraknie także darmowej pizzy i okazji do integracji społeczności.
              - text: Konferencja jest skierowana zarówno do osób początkujących, jak i profesjonalistów, w tym programistów, administratorów, studentów, uczniów szkół średnich oraz entuzjastów wolnego oprogramowania.
              - text: "Więcej informacji: piwo.sh"
