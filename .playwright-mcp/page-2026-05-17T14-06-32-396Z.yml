              - text: Happening in the space
              - text: Let's share all of the cool things we've working on!
              - text: 5MoF, or 5 Minutes of Fame, is where hackers get the opportunity to present what they've been working on to an audience of fellow hackers and curious, awesome people. With enough people, we generally let everyone get to speak, but given we can talk about our things forever, there will definitely be an after-hours hangout sesh.
              - text: No need to bring a project, just come and get inspired!
              - text: "* **WIKI PAGE & Speaker Signup Info:** [http://noisebridge.net/wiki/5mof](http://noisebridge.net/wiki/5mof)"
              - text: "* **DISCORD Signup & Planning:** [https://www.noisebridge.net/wiki/Discord](https://www.noisebridge.net/wiki/Discord)"
              - text: "* **Discord Channel:** #5mof-5-minutes-of-fame"
              - text: "**10 MINUTES OF GAME:** We are starting a new GDC-style speaker series to feature gaming enthusiasts and game developers passionate about their favorite games, their creation experiences, and gaming as a medium."
              - text: "* **WHEN:** 10MoG will start at 6PM before every 5MoF and is open to anyone who wants to talk about gaming or game development!"
