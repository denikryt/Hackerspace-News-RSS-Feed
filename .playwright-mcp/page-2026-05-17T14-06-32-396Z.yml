          - article [ref=e1912]:
            - heading "Yoga for Hackers" [level=4] [ref=e1913]
            - generic [ref=e1915]: 7:00 PM - 8:30 PM
            - paragraph [ref=e1916]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1917]:
              - text: RSVP https://www.eventbrite.com/e/yoga-for-hackers-tickets-1987365238928
              - text: "Hack your body. We'll cover fundamental yoga postures, with an emphasis on alignment, breathing practices and strength. All are welcome!Description:"
              - text: "Perfect for those of us who spend too much time at our computers or hunched over a project. No prior experience with yoga required. Please wear comfortable clothes for stretching and bring a yoga mat (or borrow one from a friend)! Instructor:"
              - text: "Hal has been practicing yoga since they were a teenager. Their first yoga teacher used to come around the room and cheerfully say the class would be in the pose for a week to 10 days. Hal has a similar sense of humor and thinks a yoga class is best when students feel both deeply supported and challenged. Hal is a software dev who appreciates a good bug and is a 200-hr certified yoga teacher. More info:"
              - text: No masks required
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/.
              - text: Please note that refunds must be requested 24 hours in advance. If you have any questions, please email classes@nycresistor.com.
          - article [ref=e1918]:
            - heading "HOLD Wax Casting Jewelry Class" [level=4] [ref=e1919]
            - generic [ref=e1921]: May 30 9:00 PM - May 31 1:00 AM
            - paragraph [ref=e1922]: 🇺🇸 · NYC Resistor
          - article [ref=e1923]:
            - 'heading "Jewelry Workshop: Drawing With Wax" [level=4] [ref=e1924]'
            - generic [ref=e1926]: May 30 9:00 PM - May 31 1:00 AM
            - paragraph [ref=e1927]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1928]:
              - text: RSVP https://www.eventbrite.com/e/jewelry-workshop-drawing-with-wax-tickets-1989111248289
              - text: "Learn how to make a wax model: adding hot wax and using carving tools and files to form your own unique pendant to cast in brass or silver.Join us for lost wax casting class, where we’ll explore the art of “Drawing with Wax” to create a custom pendant. This class is targeted towards beginners, and we will only be utilizing tools available at Resistor so you can continue to make pieces on your own after the class!In the first session, you'll learn how to make a wax model: adding hot wax and using carving tools and files to form your own unique pendant. This class will focus on using additive wax techniques to create shapes, as well as options to use “cast in place” techniques to set stones. Brass casting is included in the ticket price; silver casting costs $10-30 extra (depending on the size of your piece) paid in cash, PayPal, or Venmo the day of the class.After your wax model is complete, you’ll have two options:"
              - text: You can join the optional follow-up class on June 27th where you’ll receive your design in metal and learn the finishing process. You’ll saw off the sprue, sand, polish, and bring your piece to life. By the end, you’ll not only have a finished piece, but skills you can continue to practice with the tools available at Resistor!The instructor can finish your piece in metal for you ($25 fee per piece included in the ticket price).This class is great for complete beginners! No experience necessary
              - text: "Your instructor:"
              - text: Aliya Chambless runs the Manual Hybrid jewelry brand from Brooklyn, NY, and has been making jewelry at Resistor for 2 years.
              - text: This is a masks optional workshop
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/. Please note that refunds must be requested 24 hours in advance. If you have any questions, please email classes@nycresistor.com.
