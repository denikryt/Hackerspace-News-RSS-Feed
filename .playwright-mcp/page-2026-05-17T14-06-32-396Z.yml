            - paragraph [ref=e1949]:
              - text: Zapraszamy na Dzień Otwarty w HS Knyfyrtel! 🔧💡
              - text: Chcesz zobaczyć, co się dzieje w poznańskim hackerspace? Wpadaj na dzień otwarty – pogadamy, pokażemy nasze projekty i przestrzeń, a może razem coś zmajstrujemy! 🔧💡
              - text: "📍 Adres: ul. Słowackiego 13, 60-822 Poznań, I piętro, pokój 211"
              - text: "💬 W razie pytań wbij na nasz czat Matrix: #hspoz:hackerspace.pl"
              - text: "🌐 Więcej o nas: hspoz.pl"
              - text: Do zobaczenia! 🚀