          - article [ref=e180]:
            - 'heading "PCB Artwork: Make your own business card" [level=4] [ref=e181]'
            - generic [ref=e183]: May 3 8:00 PM - May 4 12:00 AM
            - paragraph [ref=e184]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e185]:
              - text: RSVP https://www.eventbrite.com/e/pcb-artwork-make-your-own-business-card-tickets-1987763875260
              - text: Printed circuit boards aren't just for electronics. Their layered structure make them a surprisingly expressive artistic medium.Printed circuit boards aren't just for electronics. Their layered structure, copper traces, soldermask colors, and silkscreen printing make them a surprisingly expressive artistic medium.
              - text: In this workshop, you'll use PCBs to design your own business card (or any other kind of card), ready to fabricate in real fiberglass and copper.
              - text: "You'll edit and manipulate vector art in **Inkscape**, convert your artwork into a **KiCAD** footprint, and place it on a board ready to be fabricated. Along the way, you'll learn how PCB fabricators interpret computer graphics: how vector paths become physical primitives, how colors map to fabrication layers, and how artwork gets distributed across copper, soldermask, and silkscreen to create the final board.No electronics background required — this workshop is about graphic design and fabrication, not circuit theory or soldering. If you have a computer, you can make a graphic PCB! If you already know how to design a PCB, this can help you level up their visual appeal. Background in working with SVG is helpful but not required."
              - text: "To bring:"
              - text: LaptopThis workshop is lead by Alex Tait.
              - text: "There are 4 spots reserved for students who cannot access the class at the full price, so please only make use of one of these half-off need-based tickets if that is your situation. Checkout Code: PCBACCESSTIX"
              - text: This is a masks optional workshop.
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/.
              - text: Please note that refunds must be requested 24 hours in advance. If you have any questions, please email classes@nycresistor.com.
