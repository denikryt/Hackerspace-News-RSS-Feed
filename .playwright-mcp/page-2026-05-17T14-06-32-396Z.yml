              - text: ✨ Hier gibt es 1x/Monat wechselnd Workshops und offene Labs für Kinder und Jugendliche zwischen 12 - 18 Jahre.
              - text: Interessierst du dich für gesellschaftliche Themen und für Technik? Super! Auf unseren Events und regelmäßigen Veranstaltungen in unseren Labs hast du die Möglichkeit, deine technischen Fähigkeiten auszuprobieren, neue zu erlernen und dich über gesellschaftliche Themen auszutauschen. Mehr Infos unter https://jugendhackt.org
