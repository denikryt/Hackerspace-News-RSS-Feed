            - paragraph [ref=e545]:
              - text: Cyanotypie-Workshop/Session am So, 10. Mai um 14:00 Uhr!
              - text: Cyanotypie ist ein historisches, fotografisches Druckverfahren, mit dem du Bilder in Cyan-Blautönen herstellen kannst.
              - text: Was wird während der Session gemacht?
              - text: Wir beschichten das Papier mit der lichtempfindlichen Lösung, anschließende Trocknungszeit
              - text: Du belichtest deine Motive mit UV-Licht. Du kannst 3 A4-Cyanotypien erstellen
              - text: Anschließend entwickeln wir die belichteten Papiere und machen deine Ergebnisse sichtbar
              - text: Was solltest du mitbringen?
              - text: Bringe gerne eigene Motive mit, wie (gepresste) Pflanzen, Scherenschnitte, Schablonen und Negative (z. B. auf Transparentfolie). Bei Negativen auf Transparentfolien folgen weitere Infos. Anmeldung per Mail an kornblumenwiese@googlemail.com
              - text: Wir freuen uns auf euch!
              - text: 📍Atelier
