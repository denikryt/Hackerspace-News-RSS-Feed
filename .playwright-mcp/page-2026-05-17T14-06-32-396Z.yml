            - paragraph [ref=e711]: "Woodwork Machinery Induction<br><br><b>Woodwork Machinery Induction, cost £20</b><br><br><ul><li>Mitre Saw</li><li>Table Saw</li><li>Planer-Thicknesser</li><li>Bandsaw</li></ul><br>When: 19:00, Tuesday 12th May 2026<br>5 People Maximum<br><br>Sign Up Here: <a href=\"https://docs.google.com/document/d/1AFtoQSayO5ypPIytfH8pQYv-A2iXOeSlZOeBspbqW64/edit?usp=drive_link\">https://docs.google.com/document/d/1AFtoQSayO5ypPIytfH8pQYv-A2iXOeSlZOeBspbqW64/edit?usp=drive_link</a><br><br><b>If you sign up please show your commitment to the session by paying in advance. Remember that these sessions are in demand and not showing up is an opportunity lost for somebody else.</b><br><br>This induction will cover the introductory safe use of the Table, Mitre and Band Saws and Planer Thicknesser.<br>No prior experience necessary.<br>Please note - we will provide goggles and ear defenders but you will want to wear sensible footwear and other clothing that you don’t mind getting a bit dirty.<br>"
