            - 'heading "Empathy in Design: Intro to Adaptive CAD" [level=4] [ref=e1564]'
            - generic [ref=e1566]: 8:00 PM - 10:00 PM
            - paragraph [ref=e1567]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1568]:
              - text: RSVP https://www.eventbrite.com/e/empathy-in-design-intro-to-adaptive-cad-tickets-1989049574822
              - text: Explore how thoughtful 3D modeling can improve daily life for people with disabilities, elderly users, and anyone with physical challenges.Design is not just aesthetic — it's a bridge between people and the world around them. In this hands-on Sunday workshop, you'll explore how thoughtful CAD modeling can improve daily life for people with disabilities, elderly users, and anyone navigating physical challenges.
              - text: Using real assistive design principles as your guide, you'll move from concept to a finished 3D model —ready to slice and print at any makerspace or on your own printer.
              - text: "To bring:"
              - text: "Your laptop (any OS)Free CAD software pre-installed (details sent after registration)Basic familiarity with CAD — you don't need to be an expert, and beginners are welcome.Who is this workshop for:"
              - text: Students (design, engineering, health sciences)Makers &amp; hobbyists curious about purposeful designAnyone interested in assistive or accessible techCAD learners wanting a real-world challengeIt is helpful, but not required to have a basic familiarity with CAD — you don't need to be an expert.
              - text: "Your Instructor:"
              - text: Josephine Odusanya is a roboticist and mechatronics engineer building technology at the intersection of perception, embedded systems, and human-centered design. Her work spans wearable assistive devices, real-time sensor fusion, computer vision, and control systems — with a through-line of making technology work for people who need it most. Currently, Josephine conducts research at NYU's REACTIV/VMIL Lab, developing spatial audio navigation systems for blind and low-vision users, and serves as an Adaptive Engineer at Level the Curve, a New York-based nonprofit focused on accessible technology. She is also an upcoming speaker at the Grace Hopper 2026 Conference in California, where she will also present her assistive technology research and empathy-in-design principles to a national audience.
              - text: This is a masks optional workshop.
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/. Please note that refunds must be requested 72 hours in advance. If you have any questions, please email classes@nycresistor.com.
          - article [ref=e1569]:
