            - generic [ref=e1541]: May 23 9:00 PM - May 24 12:00 AM
            - paragraph [ref=e1542]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e1543]:
              - text: RSVP https://www.eventbrite.com/e/for-repair-3d-printing-basics-tickets-1989101964521
              - text: Learn the fundamentals of 3D printing with repair in mind, including how to find, modify, and prepare 3D models for printing.This class is the first in a series focused on learning the foundational skills necessary to use digital fabrication tools available at NYC Resistor for repair projects. It builds on the basic approaches that are shared at Resistor’s Repair Café, held on the first Saturday of each month, and is meant for anyone who is eager to develop more specialized repair techniques.
              - text: This class introduces the fundamentals of 3D printing with a focus on repairing and extending the life of everyday objects. Students gain experience setting up and operating a 3D printer, working with common materials, and troubleshooting basic printing issues. They also learn how to find, modify, and prepare 3D models for printing.
              - text: Bring your laptop to set up the required software and begin hands-on practice.
              - text: In future classes in the series, students will also learn how to use digital fabrication tools such as laser cutters and CNC routers for repair projects, helping extend product lifespans and reduce waste. Through hands-on practice with all these tools, students will learn an array of ways to measure, model, and produce parts for real-world repairs, including creating replacements for broken or missing components and designing simple tools such as jigs and fixtures.
              - text: "Bio:"
              - text: Maurice Haedo Sanabria is an industrial designer and co-founder of Copincha, a hackerspace and community laboratory in Havana, Cuba, focused on developing and sharing open-source solutions to challenges such as resource scarcity and limited internet access. He is also the leader of the Havana chapter of Precious Plastic, a global network of community-based plastic recycling initiatives, and a member of NYC Resistor. He regularly organizes and facilitates repair café sessions at NYC Resistor in collaboration with Repair Café NYC, promoting community-based repair, reuse, and knowledge sharing.
              - text: His work explores repair and reuse practices, modular design, and the intersection of digital fabrication and sustainability. He applies 3D printing within repair workflows, develops DIY machines for producing filament from recycled materials, and works across the full digital fabrication pipeline, including CAD modeling and structural analysis (FEA). With over 20 years of experience in digital manufacturing, he is skilled in CAD/CAM/CAE tools and additive manufacturing processes, applied across both industrial and artistic projects, as well as in machine maintenance, customization, and firmware optimization.
              - text: "There are 10 spots reserved for people who cannot access the class at the full price, so please make use of one of these $35 need-based tickets if that is your situation. Checkout Code: Repair3D"
              - text: This is a masks optional workshop
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/. Please note that refunds must be requested 24 hours in advance. If you have any questions, please email classes@nycresistor.com.
