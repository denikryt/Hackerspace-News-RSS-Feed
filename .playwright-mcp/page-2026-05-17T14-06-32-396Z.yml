              - link "Introduction to 3D Printing ($20)" [ref=e1571] [cursor=pointer]:
                - /url: https://www.meetup.com/noisebridge/events/314632140/
            - generic [ref=e1573]: 10:00 PM - 11:30 PM
            - paragraph [ref=e1574]: 🇺🇸 · Noisebridge
            - paragraph [ref=e1575]:
              - text: Noisebridge Hackerspace
              - text: "**$5 is charged to hold a spot for this class. You can pay the remaining $15 in person with PayPal, credit cards, or cash.** *All instructors at Noisebridge are volunteers. 100% of your donation is tax-deductible and supports Noisebridge directly.*"
              - text: This class is meant to get you from 0 to your first 3D print.
              - text: In this class the full workflow from design to printed object will be demonstrated.
              - text: "Topics covered:"
              - text: "* Where and how to design or download objects (TinkerCAD/Printables/MakerWorld)"
              - text: "* Filament types, when to use which, and how to handle them"
              - text: "* How to convert your design into a file that's able to be printed"
              - text: "* How to print with supports, make objects stronger, and adjust quality"
              - text: "* How to load and unload filament and general print prep"
              - text: "* How to send your design to the printer and watch it go!"
              - text: If you are interested you can use one of our 3D printers after the class to apply what you have learned. It's recommended to bring a laptop if you plan to do your own prints. There are no guarantees that a printer will be available. They are first-come-first-serve and are used for many different Noisebridge projects.
