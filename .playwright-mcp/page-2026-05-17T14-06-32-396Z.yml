          - article [ref=e102]:
            - heading "Repair your broken items at Repair Cafe!" [level=4] [ref=e103]
            - generic [ref=e105]: May 2 9:00 PM - May 3 12:00 AM
            - paragraph [ref=e106]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e107]:
              - text: RSVP https://www.eventbrite.com/e/repair-your-broken-items-at-repair-cafe-tickets-1987782761750
              - text: Repair can be intimidating if you haven’t done it before, and the hardest part often is getting started. It’s easier with support!Repair can be intimidating if you haven’t done it before, and the hardest part often is getting started. It’s easier with other people to get you over that hump, and that’s where Repair Cafe NYC comes in!
              - text: We’re a group of DIYers who love fixing things! (And we’re also on Discord!)
              - text: Repair Cafe NYC organizes events where we collectively diagnose and fix broken objects, share skills, and build intergenerational, community-based knowledge. We’re interested in helping each other gain confidence in the act of repair to prevent our belongings from going to the landfill, and thinking critically about where our things come from.
              - text: People bring a wide variety of items to events, including lamps, chairs, mugs/plates, clothes and more. Think small, portable items (no large appliances, bicycles or couches).
              - text: "When: Saturday May 2nd, 2pm-5pmWhere: NYC Resistor, 87 3rd Ave, Brooklyn, NY 11217"
              - text: "At check out you will be asked these questions:"
              - text: What’s broken in your life that you want to repair? Describe it and how it is broken.Does your repair require specific tools or parts? Do you have them?Are you interested in helping others with their repairs? If so, what skills would you like to share?Please be sure to fill out the RSVP form completely. This helps us to prepare for the event. If you do not fill out the form, we will assume the RSVP was by mistake and cancel the ticket.
              - text: Questions? Email us at repaircafenyc@gmail.com
              - text: This is a masks optional event.
              - text: As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/.
