          - article [ref=e390]:
            - heading "Learn to Use a Laser Cutter to Cut and Etch Your Own Designs" [level=4] [ref=e391]
            - generic [ref=e393]: 1:00 AM - 4:00 AM
            - paragraph [ref=e394]: 🇺🇸 · NYC Resistor
            - paragraph [ref=e395]:
              - text: RSVP https://www.eventbrite.com/e/learn-to-use-a-laser-cutter-to-cut-and-etch-your-own-designs-tickets-1987369848716
              - text: Harness the power of an Epilog 60 Watt Laser! In this class you'll learn everything you need.Harness the power of an Epilog 60 Watt Laser! In this class you'll learn everything you need to know to make the ideas in your head become a reality with a laser.
              - text: "In this three hour class, you will learn:"
              - text: "How to set up a file for cutting on the laser cutter in Inkscape or Adobe Illustrator.Laser cutter safety including materials testing.Laser cutter operation including configuration, cuts and raster etching in common materials like wood, acrylic, cardboard and others.At the end of class, you will go home with:"
              - text: "One laser cut project, either the class default or a simple one of your own design (see below for details)Resistor Laser Certification, enabling you to use our laser on Craft Nights.Please bring the following to class:"
              - text: "A laptop with either Inkscape (free: download here: https://inkscape.org/release/inkscape-1.2.1/) or Adobe Illustrator installed."
              - text: A USB jump drive
              - text: The following items are optional if you'd like to try cutting a simple custom design. If your file ends up being too complicated, we may have you do the class default project first, just to learn the laser in the time allotted - but we'll definitely help you with your more complex cut at a free Craft Night in future!
              - text: An SVG vector file of a simple shape you'd like to cut for your first cut.A piece of 1/8 inch or thinner wood, acrylic or cardboard you'd like to cut. If you can't bring your own material, small pieces will be made available, or larger pieces for purchase on site.Please be on time for the start of class! If you're late you will miss your slot.
              - text: This class will be taught by NYC Resistor member Katie. As with all NYC Resistor events, this class is 18+ and governed by our Code of Conduct. The Code of Conduct, as well as accessibility information, can be found at www.nycresistor.com/participate/.
              - text: Please note that refunds must be requested 72 hours in advance. If you have any questions, please email classes@nycresistor.com.
              - text: This program is supported, in part, by public funds from the New York City Department of Cultural Affairs in partnership with the City Council.
